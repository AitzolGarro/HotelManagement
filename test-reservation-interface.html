<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Interface Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Reservation Management Interface Test</h2>
        
        <!-- Test the modal structure -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#reservationModal">
            Test New Reservation Modal
        </button>
        
        <!-- Simplified reservation modal for testing -->
        <div class="modal fade" id="reservationModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">New Reservation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="reservationForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="reservationHotel" class="form-label">Hotel</label>
                                    <select class="form-select" id="reservationHotel" required>
                                        <option value="">Select Hotel</option>
                                        <option value="1">Test Hotel 1</option>
                                        <option value="2">Test Hotel 2</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="reservationRoom" class="form-label">Room</label>
                                    <select class="form-select" id="reservationRoom" required>
                                        <option value="">Select Room</option>
                                        <option value="1">Room 101</option>
                                        <option value="2">Room 102</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="checkInDate" class="form-label">Check-in Date</label>
                                    <input type="date" class="form-control" id="checkInDate" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="checkOutDate" class="form-label">Check-out Date</label>
                                    <input type="date" class="form-control" id="checkOutDate" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="guestFirstName" class="form-label">Guest First Name</label>
                                    <input type="text" class="form-control" id="guestFirstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="guestLastName" class="form-label">Guest Last Name</label>
                                    <input type="text" class="form-control" id="guestLastName" required>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="testValidation()">Test Validation</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple validation test
        function testValidation() {
            const form = document.getElementById('reservationForm');
            const inputs = form.querySelectorAll('input[required], select[required]');
            let isValid = true;
            
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    input.classList.add('is-invalid');
                    isValid = false;
                } else {
                    input.classList.remove('is-invalid');
                }
            });
            
            if (isValid) {
                alert('Form validation passed!');
            } else {
                alert('Please fill in all required fields');
            }
        }
        
        // Set minimum dates
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkInDate').min = today;
            document.getElementById('checkOutDate').min = today;
        });
    </script>
</body>
</html>
