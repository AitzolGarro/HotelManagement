version: '3.8'
services:
  hotelmanagement:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotelmanagement
    ports:
      - '8082:8080'   # host_port:container_port
      - '8083:8081'   # optional, if you need the second port externally
    environment:
      - 'ASPNETCORE_URLS=http://+:8080'  # container still listens on 8080
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
